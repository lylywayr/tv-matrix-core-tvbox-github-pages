# Copy this file to config/sources.yml and replace the examples with sources
# you are authorized to crawl and redistribute.
fixed_sources:
  - name: example-tvbox-json
    url: https://example.com/tvbox.json
    priority: 5
  - name: example-m3u
    url: https://example.com/live.m3u
    priority: 3

discovery:
  enabled: true
  max_candidates_per_run: 320
  max_urls_per_seed: 20
  seed_urls:
    - name: gaotianliuyun-js
      url: https://raw.githubusercontent.com/gaotianliuyun/gao/8213bb046f4dce746b5f2ddcddb13a336d0b0d60/js.json
      priority: 9
    - name: freedtv-box
      url: https://raw.githubusercontent.com/FreeDTV/FreeD/2511407b95ec434cf5d9e65f36aac63141c4a7ba/box.json
      priority: 8
  pages:
    - name: xduo-api-index
      url: https://xduo.app/box/api/
      priority: 5
    - name: cnblogs-tvbox-index
      url: https://www.cnblogs.com/johnjackson/p/17082254.html
      priority: 4
    - name: qipo-yingshicang-index
      url: https://down.7po.com/article/2189.html
      priority: 4
  github_code_search:
    enabled: true
    max_files_per_query: 8
    max_urls_per_file: 30
    queries:
      - '"tvbox" "sites" "api" extension:json'
      - '"影视仓" "sites" "api" extension:json'
      - '"TVBox" "m3u" extension:txt'
      - '"接口" "jar" "sites" extension:json'
      - '"多仓" "影视仓" "url" extension:json'
      - '"FongMi" "影视仓" "sites" extension:json'

validation:
  concurrency: 32
  base_timeout_seconds: 8
  max_timeout_seconds: 20
  retries: 2
  backoff_base_seconds: 0.8
  tcp_probe_priority_threshold: 7
  tcp_ports: [80, 443, 8080]

scoring:
  sleep_after_failures: 5
  revive_every_days: 30
  recent_window: 3
  weights:
    recent_success: 0.45
    lifetime_success: 0.35
    latency: 0.15
    content_quality: 0.05

output:
  site_base_url: ""
  keep_backups: 3
  change_threshold_online_rate: 0.02
  max_valid_outputs: 80
