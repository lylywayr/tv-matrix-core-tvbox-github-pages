      url: https://github.com/tushen6/Tomorrow
      priority: 4
  github_code_search:
    enabled: true
    max_files_per_query: 8
    max_urls_per_file: 30
    queries:
      - '"tvbox" "sites" "api" extension:json'
      - '"影视仓" "sites" "api" extension:json'
      - '"TVBox" "m3u" extension:txt'
      - '"接口" "jar" "sites" extension:json'
      - '"多仓" "影视仓" "url" extension:json'
      - '"FongMi" "影视仓" "sites" extension:json'

validation:
  concurrency: 32
  base_timeout_seconds: 8
  max_timeout_seconds: 20
  retries: 2
  backoff_base_seconds: 0.8
  tcp_probe_priority_threshold: 7
  tcp_ports: [80, 443, 8080]

scoring:
  sleep_after_failures: 5
  revive_every_days: 30
  recent_window: 3
  weights:
    recent_success: 0.45
    lifetime_success: 0.35
    latency: 0.15
    content_quality: 0.05

output:
  site_base_url: "https://lylywayr.github.io/tv-matrix-core-tvbox-github-pages/"
  keep_backups: 3
  change_threshold_online_rate: 0.02
  max_valid_outputs: 80
